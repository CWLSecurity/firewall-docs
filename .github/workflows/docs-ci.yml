name: PROJECT_HOME Docs CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required docs exist
        run: |
          set -euo pipefail
          test -f README.md
          test -f ARCHITECTURE.md
          test -f DEPLOYMENT.md
          test -f SECURITY_MODEL.md
          test -f SECURITY.md
          test -f LAUNCH_CHECKLIST.md
          test -f LAUNCH_STATUS.md
          test -f SMOKE_TEST_PLAN.md
          test -f VERIFY_YOUR_FIREWALL.md
          test -f BOT_AUTOMATION.md
          test -f OPERATIONS_RUNBOOK.md
          test -f TERMS_OF_USE.md
          test -f PRIVACY_NOTICE.md

      - name: Check documentation integrity manifest
        run: |
          chmod +x ./scripts/integrity.sh
          ./scripts/integrity.sh check
